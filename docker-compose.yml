services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: video_factory
      POSTGRES_USER: video_user
      POSTGRES_PASSWORD: video_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://video_user:video_pass@postgres:5432/video_factory
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: video-assets
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://video_user:video_pass@postgres:5432/video_factory
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: video-assets
      MINIO_SECURE: "false"
    command: celery -A app.celery_app.celery_app worker -Q gpu-jobs --loglevel=info
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
