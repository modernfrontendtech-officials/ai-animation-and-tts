services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: video_factory
      POSTGRES_USER: video_user
      POSTGRES_PASSWORD: video_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_user -d video_factory"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://video_user:video_pass@postgres:5432/video_factory
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: video-assets
      MINIO_SECURE: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - backend_artifacts:/tmp/video-factory
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://video_user:video_pass@postgres:5432/video_factory
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: video-assets
      MINIO_SECURE: "false"
      LOG_LEVEL: INFO
    command: celery -A app.celery_app.celery_app worker -Q gpu-jobs --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - backend_artifacts:/tmp/video-factory
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/index.html || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  proxy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - ./.env.example
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  minio_data:
  backend_artifacts:
  caddy_data:
  caddy_config:
  prometheus_data:
