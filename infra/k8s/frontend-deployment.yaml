apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-video-factory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ai-video-factory/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-video-factory
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
