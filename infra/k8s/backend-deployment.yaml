apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-video-factory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ai-video-factory/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-video-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-video-factory
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
